<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gear We Go - Smart Tension Advisor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>⚙️ Gear We Go</h1>
        <p>Smart Mechanical Size & Pitch Calculator</p>
    </header>

    <main>
        <div class="input-group">
            <label for="type-select">Component Type:</label>
            <select id="type-select">
                <optgroup label="Belts (Find Pre-Made Product)">
                    <option value="rev-gt2-55">GT2 3mm Pitch Belt Series</option>
                    <option value="rev-rt25-32">RT25 6.35mm Pitch Belt Series</option>
                </optgroup>
                <optgroup label="Chains (Calculate Exact Links to Cut)">
                    <option value="rev-chain-25">#25 Roller Chain (6.35mm Pitch)</option>
                    <option value="rev-chain-35">#35 Heavy Chain (9.525mm Pitch)</option>
                </optgroup>
            </select>
        </div>

        <div class="input-row">
            <div class="input-group">
                <label>Sprocket/Pulley 1 Teeth:</label>
                <input type="number" id="teeth1" value="24" min="1">
            </div>
            <div class="input-group">
                <label>Sprocket/Pulley 2 Teeth:</label>
                <input type="number" id="teeth2" value="24" min="1">
            </div>
        </div>

        <div class="input-group">
            <label>Desired Center Spacing (mm):</label>
            <input type="number" id="desired-center" value="120" step="0.01" min="1">
        </div>

        <button onclick="recommendSize()">Generate Recommendation</button>

        <div id="results-panel" class="results-container" style="display: none;">
            <h3>Recommendation Engine Result:</h3>
            <div class="result-card">
                <p><strong>Target Item:</strong> <span id="rec-name">--</span></p>
                <p><strong>Sizing Configuration:</strong> <span id="rec-detail">--</span></p>
                <p><strong>Source SKU:</strong> <span id="rec-sku">--</span></p>
                <p><strong>Perfect Theoretical Center:</strong> <span id="rec-center">--</span></p>
                <div id="center-drop-container">
                     <p id="chassis-center-container"><strong>Recommended Center Bore CNC Cut:</strong> <span id="rec-chassis-center">--</span></p>
                </div>
                <p><strong>Tension Assessment:</strong> <span id="rec-tension">--</span></p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
